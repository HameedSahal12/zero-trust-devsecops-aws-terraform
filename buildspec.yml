version: 0.2

phases:
  install:
    commands:
      - echo Installing Terraform...
      - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
      - unzip -o terraform.zip -d /tmp
      - mv /tmp/terraform /usr/local/bin/
      - terraform version

  pre_build:
  commands:
    - echo Running Security Checks...

    # Existing basic check
    - grep -r "password" terraform/ && echo "❌ Hardcoded secret found!" && exit 1 || echo "✅ No secrets found"

    # NEW: Install Checkov
    - pip install checkov

    # NEW: Run Checkov scan
    - checkov -d terraform/

  build:
    commands:
      - echo Terraform Init
      - cd terraform
      - terraform init

      - echo Terraform Validate
      - terraform validate

      - echo Terraform Plan
      - terraform plan

  post_build:
    commands:
      - echo Applying Terraform
      - terraform apply -auto-approve
